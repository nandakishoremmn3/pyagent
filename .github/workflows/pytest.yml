name: Run Pytest with Trunk Analytics

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests and generate JUnit report
        # We use the specific flags you requested for JUnit compatibility
        run: pytest --junit-xml=junit.xml -o junit_family=xunit1
        if: always()

      - name: Upload Test Results to Trunk.io
        if: ${{ !cancelled() }} 
        continue-on-error: true 
        uses: trunk-io/analytics-uploader@main
        with:
          junit-paths: "junit.xml"
          org-slug: nandakishore
          token: ${{ secrets.TRUNK_API_TOKEN }}

      - name: Upload JUnit report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-junit-report
          path: junit.xml
